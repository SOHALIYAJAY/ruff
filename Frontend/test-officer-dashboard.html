<!DOCTYPE html>
<html>
<head>
    <title>Officer Dashboard Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .button { padding: 10px 20px; margin: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .result { margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 4px; }
        .success { color: #155724; }
        .error { color: #721c24; }
        .loading { color: #6c757d; }
    </style>
</head>
<body>
    <h1>Officer Dashboard API Test</h1>
    
    <div class="test-section">
        <h2>1. Test Login</h2>
        <button onclick="testLogin()">Login as Officer</button>
        <div id="login-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. Test Dashboard Stats</h2>
        <button onclick="testDashboardStats()">Test Dashboard Stats</button>
        <div id="stats-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. Test Recent Complaints</h2>
        <button onclick="testRecentComplaints()">Test Recent Complaints</button>
        <div id="complaints-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>4. Test Monthly Trends</h2>
        <button onclick="testMonthlyTrends()">Test Monthly Trends</button>
        <div id="trends-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>5. Test Profile</h2>
        <button onclick="testProfile()">Test Profile</button>
        <div id="profile-result" class="result"></div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';
        
        async function testLogin() {
            const loginData = {
                email: 'william.traffic@civic.gov.in',
                password: 'officer123'
            };
            
            try {
                const response = await fetch(`${API_BASE}/api/login/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(loginData)
                });
                
                const result = document.getElementById('login-result');
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.access) {
                        localStorage.setItem('access_token', data.access);
                        localStorage.setItem('refresh_token', data.refresh);
                        result.innerHTML = '<span class="success">✓ Login successful! Token saved.</span>';
                    } else {
                        result.innerHTML = '<span class="error">✗ Login failed: No access token</span>';
                    }
                } else {
                    const errorText = await response.text();
                    result.innerHTML = `<span class="error">✗ Login failed: ${response.status} - ${errorText}</span>`;
                }
            } catch (error) {
                document.getElementById('login-result').innerHTML = `<span class="error">✗ Login error: ${error.message}</span>`;
            }
        }
        
        async function testDashboardStats() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                document.getElementById('stats-result').innerHTML = '<span class="error">Please login first</span>';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/officer/dashboard-stats/`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = document.getElementById('stats-result');
                
                if (response.ok) {
                    const data = await response.json();
                    result.innerHTML = `
                        <span class="success">✓ Dashboard Stats API Working!</span>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    const errorText = await response.text();
                    result.innerHTML = `<span class="error">✗ Dashboard Stats Error: ${response.status} - ${errorText}</span>`;
                }
            } catch (error) {
                document.getElementById('stats-result').innerHTML = `<span class="error">✗ Network Error: ${error.message}</span>`;
            }
        }
        
        async function testRecentComplaints() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                document.getElementById('complaints-result').innerHTML = '<span class="error">Please login first</span>';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/officer/recent-complaints/`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = document.getElementById('complaints-result');
                
                if (response.ok) {
                    const data = await response.json();
                    result.innerHTML = `
                        <span class="success">✓ Recent Complaints API Working!</span>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    const errorText = await response.text();
                    result.innerHTML = `<span class="error">✗ Recent Complaints Error: ${response.status} - ${errorText}</span>`;
                }
            } catch (error) {
                document.getElementById('complaints-result').innerHTML = `<span class="error">✗ Network Error: ${error.message}</span>`;
            }
        }
        
        async function testMonthlyTrends() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                document.getElementById('trends-result').innerHTML = '<span class="error">Please login first</span>';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/officer/monthly-trends/`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = document.getElementById('trends-result');
                
                if (response.ok) {
                    const data = await response.json();
                    result.innerHTML = `
                        <span class="success">✓ Monthly Trends API Working!</span>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    const errorText = await response.text();
                    result.innerHTML = `<span class="error">✗ Monthly Trends Error: ${response.status} - ${errorText}</span>`;
                }
            } catch (error) {
                document.getElementById('trends-result').innerHTML = `<span class="error">✗ Network Error: ${error.message}</span>`;
            }
        }
        
        async function testProfile() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                document.getElementById('profile-result').innerHTML = '<span class="error">Please login first</span>';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/officer/profile/`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = document.getElementById('profile-result');
                
                if (response.ok) {
                    const data = await response.json();
                    result.innerHTML = `
                        <span class="success">✓ Profile API Working!</span>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    const errorText = await response.text();
                    result.innerHTML = `<span class="error">✗ Profile Error: ${response.status} - ${errorText}</span>`;
                }
            } catch (error) {
                document.getElementById('profile-result').innerHTML = `<span class="error">✗ Network Error: ${error.message}</span>`;
            }
        }
        
        // Auto-login on page load
        window.onload = function() {
            testLogin();
        };
    </script>
</body>
</html>
