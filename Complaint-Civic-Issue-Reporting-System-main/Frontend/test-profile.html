<!DOCTYPE html>
<html>
<head>
    <title>Officer Profile Test</title>
</head>
<body>
    <h1>Officer Profile API Test</h1>
    <button onclick="testProfile()">Test Profile API</button>
    <div id="result"></div>
    
    <script>
        async function testProfile() {
            const token = localStorage.getItem('access_token');
            const API_BASE = 'http://127.0.0.1:8000';
            
            console.log('Token:', token);
            
            const headers = {
                'Content-Type': 'application/json'
            };
            
            if (token && token !== 'undefined' && token !== 'null') {
                headers['Authorization'] = `Bearer ${token}`;
            }
            
            try {
                console.log('Making request to:', `${API_BASE}/api/officer/profile/`);
                const response = await fetch(`${API_BASE}/api/officer/profile/`, { headers });
                
                console.log('Response status:', response.status);
                console.log('Response ok:', response.ok);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Profile data:', data);
                    document.getElementById('result').innerHTML = `
                        <h3>Profile Data:</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    const errorText = await response.text();
                    console.log('Error response:', errorText);
                    document.getElementById('result').innerHTML = `
                        <h3>Error:</h3>
                        <p>Status: ${response.status}</p>
                        <pre>${errorText}</pre>
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = `
                    <h3>Network Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }
        
        // Test login first
        async function testLogin() {
            const loginData = {
                email: 'william.traffic@civic.gov.in',
                password: 'officer123'
            };
            
            try {
                const response = await fetch('http://127.0.0.1:8000/api/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(loginData)
                });
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Login response:', data);
                    if (data.access) {
                        localStorage.setItem('access_token', data.access);
                        localStorage.setItem('refresh_token', data.refresh);
                        console.log('Token saved to localStorage');
                    }
                } else {
                    console.log('Login failed');
                }
            } catch (error) {
                console.error('Login error:', error);
            }
        }
        
        // Auto-login on page load
        testLogin();
    </script>
</body>
</html>
